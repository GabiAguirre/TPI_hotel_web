<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Iniciar sesión</h2>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" [(ngModel)]="email" placeholder="gabriel@mail.com">
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-control" type="password" [(ngModel)]="password" placeholder="********">
    </div>

    <button class="btn btn-primary w-100" type="button" (click)="login()" [disabled]="isLoading">
      {{ isLoading ? 'Entrando...' : 'Iniciar sesión' }}
    </button>

    <small *ngIf="message" class="text-muted d-block mt-2 text-center">{{ message }}</small>

    <p class="auth-footer">
      ¿No tenés cuenta? <a routerLink="/register">Registrate</a>
    </p>
  </div>
</div>
