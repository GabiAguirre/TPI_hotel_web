<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Logo G Hotel</title>
  <desc id="desc">Logo azul sobre fondo blanco con letra G y simbolo de hotel.</desc>
  <rect x="0" y="0" width="420" height="120" rx="16" fill="#ffffff"/>

  <circle cx="56" cy="60" r="34" fill="#0d6efd"/>
  <text x="56" y="72" text-anchor="middle" font-size="46" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#ffffff">G</text>

  <text x="110" y="60" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0d6efd">Gabi Hotel</text>
  <text x="110" y="84" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Confort y descanso</text>
</svg>
